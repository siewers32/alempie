{% extends "base.html" %}

{% block title %}Alempie{% endblock %}

{% block content %}
<table>
    <thead>
        <tr>
            <th>Departments</th>
            <th>Name</th>
            <th>Description</th>
        </tr>
    </thead>
    <tbody>
        {% for department in departments %}

        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
